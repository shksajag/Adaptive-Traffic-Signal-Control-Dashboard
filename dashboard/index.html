<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Signal Control — DQN vs Fixed-Time</title>
    <meta name="description"
        content="Dashboard comparing DQN reinforcement learning and Fixed-Time traffic signal control models">
    <link rel="stylesheet" href="styles.css?v=3">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo-section">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="5" r="3" />
                            <rect x="9" y="1" width="6" height="22" rx="3" fill="none" />
                            <circle cx="12" cy="12" r="3" />
                            <circle cx="12" cy="19" r="3" />
                        </svg>
                    </div>
                    <div>
                        <h1>Traffic Signal Control Analysis</h1>
                        <p class="subtitle">DQN Reinforcement Learning · Fixed-Time Baseline · SUMO Simulation</p>
                    </div>
                </div>
                <div class="header-badges">
                    <span class="header-badge dqn-badge">DQN Agent</span>
                    <span class="header-badge fixed-badge">Fixed-Time</span>
                    <button class="theme-toggle-btn" id="theme-toggle-btn" type="button" aria-label="Switch theme">
                        <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                            <circle cx="12" cy="12" r="4"></circle>
                            <path d="M12 2v3"></path>
                            <path d="M12 19v3"></path>
                            <path d="M2 12h3"></path>
                            <path d="M19 12h3"></path>
                            <path d="M4.9 4.9l2.1 2.1"></path>
                            <path d="M17 17l2.1 2.1"></path>
                            <path d="M17 7l2.1-2.1"></path>
                            <path d="M4.9 19.1L7 17"></path>
                        </svg>
                        <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                            <path d="M21 12.7A9 9 0 1 1 11.3 3a7 7 0 0 0 9.7 9.7z"></path>
                        </svg>
                        <span id="theme-toggle-label">Light Mode</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Controls Toolbar -->
        <div class="controls-wrapper">
            <section class="controls-toolbar">
                <div class="toolbar-item">
                    <span class="toolbar-label">Scenario</span>
                    <div class="select-wrapper">
                        <select id="model-version">
                            <option value="10">Off-Peak Hours</option>
                            <option value="16">Peak Hours</option>
                        </select>
                    </div>
                </div>

                <div class="toolbar-divider"></div>

                <div class="toolbar-item toggle-item">
                    <div class="toggle-group" id="data-type-toggle">
                        <button class="toggle-btn active" data-value="training">Training</button>
                        <button class="toggle-btn" data-value="testing">Testing</button>
                    </div>
                </div>

                <div class="toolbar-divider"></div>

                <div class="toolbar-item">
                    <span class="toolbar-label">Metric</span>
                    <div class="select-wrapper">
                        <select id="metric-select">
                            <!-- Options populated dynamically -->
                        </select>
                    </div>
                </div>

                <div class="toolbar-divider"></div>

                <div class="toolbar-item">
                    <span class="toolbar-label">Smoothing</span>
                    <div class="select-wrapper">
                        <select id="smoothing-select">
                            <option value="1">Off</option>
                            <option value="5">5-pt MA</option>
                            <option value="10">10-pt MA</option>
                            <option value="20">20-pt MA</option>
                        </select>
                    </div>
                </div>

                <div class="toolbar-divider"></div>

                <div class="toolbar-item">
                    <button class="action-btn" id="download-csv-btn">Download CSV</button>
                </div>
            </section>
        </div>

        <!-- Context Banner -->
        <section class="context-banner" id="context-banner"></section>

        <!-- Quick Overview -->
        <section class="overview-strip" id="overview-strip"></section>

        <!-- Statistics Cards -->
        <section class="stats-section">
            <div class="stats-grid" id="stats-grid">
                <div class="loading">Loading data</div>
            </div>
        </section>

        <!-- Charts Section -->
        <section class="charts-section">
            <div class="chart-container">
                <div class="chart-header">
                    <div>
                        <h2 class="chart-title" id="chart-title">Time Series</h2>
                        <span class="chart-subtitle" id="chart-metric-label">Queue Length over Episodes</span>
                    </div>
                </div>
                <div class="chart-wrapper">
                    <canvas id="time-series-chart"></canvas>
                </div>
            </div>

            <div class="chart-container">
                <div class="chart-header">
                    <div>
                        <h2 class="chart-title" id="bar-chart-title">Comparison</h2>
                        <span class="chart-subtitle" id="bar-chart-subtitle">Average Values by Model</span>
                    </div>
                </div>
                <div class="chart-wrapper bar-chart-wrapper">
                    <canvas id="comparison-chart"></canvas>
                </div>
            </div>
        </section>

        <!-- Data Summary Table -->
        <section class="table-section">
            <div class="table-card">
                <h2 class="table-title">Summary Statistics</h2>
                <div class="table-wrapper" id="summary-table"></div>
            </div>
        </section>

        <!-- Performance Analysis -->
        <section class="analysis-section" id="analysis-section">
            <div class="analysis-card">
                <h2 class="analysis-title">Performance Analysis</h2>
                <div class="analysis-content" id="analysis-content"></div>
            </div>
        </section>

        <!-- Key Findings -->
        <section class="findings-section">
            <div class="findings-card">
                <h2 class="findings-title">Key Findings</h2>
                <div class="findings-content" id="findings-content"></div>
            </div>
        </section>
    </div>

    <script src="app.js?v=3"></script>
</body>

</html>
